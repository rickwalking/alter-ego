repos:
  # Generic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Ruff: lint + format (backend src/ and tests/ only; scripts/ excluded)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/(src|tests)/
      - id: ruff-format
        files: ^backend/(src|tests)/

  # Security: detect hardcoded secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  # Architecture: import-linter (backend only)
  - repo: local
    hooks:
      - id: lint-imports
        name: Check import architecture
        entry: bash -c 'cd backend && uv run lint-imports'
        language: system
        pass_filenames: false
        files: ^backend/src/.*\.py$

      - id: import-boundary-ratchet
        name: Ratchet non-import boundaries (get_container, .commit)
        entry: python3 scripts/metrics/import_baseline.py --check
        language: system
        pass_filenames: false
        files: ^backend/src/.*\.py$

  # Dead code: vulture (backend only)
  - repo: local
    hooks:
      - id: vulture
        name: Check for dead code
        entry: bash -c 'cd backend && uv run vulture src/ vulture_whitelist.py --min-confidence 80'
        language: system
        pass_filenames: false
        files: ^backend/src/.*\.py$

  # Frontend: ESLint + TypeScript (CI QA subset)
  - repo: local
    hooks:
      - id: frontend-eslint
        name: Frontend ESLint (errors only)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$
      - id: frontend-typecheck
        name: Frontend TypeScript
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$
