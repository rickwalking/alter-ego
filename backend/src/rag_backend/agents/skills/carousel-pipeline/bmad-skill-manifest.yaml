type: skill
name: carousel-pipeline
version: 2.0.0
description: >
  Editorial carousel and blog content generation pipeline with per-phase human review.
  Seven phases: research, outline, content, design, images, final review.
  Produces bilingual slides, blog post (pt-BR + en), design tokens, images,
  and Instagram caption. Standards live in _shared/; phase workflow in phases/.
triggers:
  - "create a carousel"
  - "create a new social media post"
  - "generate carousel slides"
  - "make an Instagram post"
  - "create blog content"
  - "create carousel"
  - "start editorial workflow"
  - "editorial workflow"
workflow:
  type: editorial
  api_base: /api/carousels/{id}/workflow
  phases:
    - id: research
      skill: phases/research
      subagent: research_synthesizer
      shared:
        - _shared/critical-rules.md
        - _shared/anti-patterns.md
    - id: outline
      skill: phases/outline
      subagent: outline_planner
      shared:
        - _shared/critical-rules.md
        - _shared/text-formatting.md
    - id: content
      skill: phases/content
      subagent: content_drafter
      shared:
        - _shared/content-contracts.md
        - _shared/text-formatting.md
        - _shared/anti-patterns.md
    - id: design
      skill: phases/design
      node: apply_design
      shared:
        - _shared/design-system.md
    - id: images
      skill: phases/images
      node: render_images
      shared:
        - _shared/image-generation.md
    - id: final_review
      skill: phases/final-review
      nodes:
        - compose_blog
        - score_quality
        - caption_writer
      shared:
        - _shared/export-and-caption.md
        - _shared/content-contracts.md
  endpoints:
    start: POST /api/carousels/{id}/workflow/start
    resume: POST /api/carousels/{id}/workflow/resume
    stream: GET /api/carousels/{id}/workflow/stream
    preview: GET /api/carousels/{id}/preview/*
  deprecated_endpoints:
    - POST /api/carousels/{id}/generate
    - GET /api/carousels/{id}/stream
    - GET /api/carousels/{id}/status
    - POST /api/carousels/{id}/resume
tools:
  - Agent
  - Bash
  - WebFetch
  - WebSearch
  - Playwright
input_schema:
  title:
    type: string
    description: Working title for the carousel (optimized in outline phase)
  audience:
    type: string
    description: Target audience (e.g., "AI, software developers, architects")
  niche:
    type: string
    description: Content niche (e.g., "AI/Tech", "Cybersecurity")
  slides:
    type: string
    default: "1 intro, 3 content, 1 closing, 1 cta"
    description: Slide configuration string
  aspect_ratio:
    type: string
    default: "1080x1350"
    description: Image dimensions (default Instagram portrait)
  sources:
    type: array
    items:
      type: string
    description: Authoritative source URLs (X posts, GitHub issues, blogs) — scraped first in research
  language:
    type: string
    default: "pt-BR"
    description: Primary language for content (default Brazilian Portuguese)
  generate_images:
    type: boolean
    default: true
    description: Whether to generate images via Gemini in images phase
output:
  type: object
  properties:
    project_id:
      type: string
      description: UUID of the created carousel project
    workflow_status:
      type: string
      description: Editorial workflow status (e.g., approved_for_publish, failed)
    phase:
      type: string
      description: Current workflow phase
    phase_status:
      type: string
      description: in_progress, awaiting_human, or completed for current phase
    blog_pt:
      type: string
      description: Blog post in Brazilian Portuguese markdown
    blog_en:
      type: string
      description: Blog post in English markdown
    design_tokens:
      type: object
      description: Complete visual design system for frontend consumption
    caption:
      type: string
      description: Instagram caption with hashtags
    slides:
      type: array
      description: Array of slide objects with heading, body, image paths
    output_dir:
      type: string
      description: Path to generated output files
standards:
  canonical_path: _shared/
  readme: _shared/README.md
  files:
    - _shared/critical-rules.md
    - _shared/anti-patterns.md
    - _shared/content-contracts.md
    - _shared/text-formatting.md
    - _shared/design-system.md
    - _shared/image-generation.md
    - _shared/export-and-caption.md
