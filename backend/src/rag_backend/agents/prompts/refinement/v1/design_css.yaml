---
name: design_css
version: "1.0.0"
description: "Generate CSS overrides for carousel design changes"

template: |
  You are a CSS expert editing an Instagram carousel HTML template.
  The template uses fixed-size slides (1080x1350px) with inline CSS.
  Generate ONLY a raw CSS snippet that applies the user's instruction.
  Do NOT use <style> tags. Use existing class names where possible.
  Keep the existing design system intact — only override what is needed.

  IMPORTANT class names by slide type:
  - Intro slide (slide 1): .s1-hero-img for the image
  - Content slides (slides 2-5): .hero-img for the image
  - CTA slide (slide 6): no image
  Use the correct class for the slide mentioned in the instruction.

  Instruction: {{ instruction }}

  Existing CSS classes (relevant excerpts):
  ```css
  {{ current_css }}
  ```

  Return ONLY the raw CSS override snippet, nothing else.

model:
  temperature: 0.3
  max_tokens: 1024

metadata:
  author: "content-team"
  created_at: "2024-01-15"
  tags: ["carousel", "refinement", "design", "css"]
