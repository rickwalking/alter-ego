---
name: carousel_caption
version: "1.0.0"
description: "Generate Instagram caption from slide headings"

template: |
  Generate an Instagram caption for this carousel.

  Title: {{ title }}
  Slides:
  {% for num, heading in slide_headings %}
  Slide {{ num }}: {{ heading }}
  {% endfor %}

  Structure:
  1. Hook (1-2 lines with emoji)
  2. Value promise
  3. Comment question
  4. Double CTA (save + share)
  5. 12-18 hashtags mixing Portuguese and English

  Style: Informal Brazilian Portuguese, engaging, use emojis.

model:
  temperature: 0.7
  max_tokens: 512

metadata:
  author: "content-team"
  created_at: "2024-01-15"
  tags: ["carousel", "caption", "instagram"]
