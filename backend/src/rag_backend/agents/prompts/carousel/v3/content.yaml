---
name: carousel_content
version: "3.0.0"
description: "Draft bilingual hero lower-third carousel slide copy from outline context"

template: |
  Draft carousel slide copy for slide {{ slide_number }} using the structured
  hero_lower_third contract.

  Slide index: {{ slide_number }}
  Slide title: {{ title }}
  Key points: {{ key_points }}
  Locale: {{ locale }}
  Phase: {{ phase }}

  {{ presentation_policy_context }}

  Return ONLY a JSON object:
  {draft_text, confidence_score, sources_used, icon_name?}

  Use Lucide icon_name values from the policy allowlist for structured items.
  Do not use emoji icons. Obey visible-text rules and copy budgets above.

  {{ persona_context }}
  {{ revision_notes }}

model:
  temperature: 0.7
  max_tokens: 2048

metadata:
  author: "content-team"
  created_at: "2026-06-09"
  tags: ["carousel", "content", "hero-lower-third-v1"]
