# Mutmut Configuration for Agent Split Security

[mutmut]
paths_to_mutate = src/rag_backend/agents/alter_ego_agent.py,src/rag_backend/application/tools/knowledge_base/,src/rag_backend/infrastructure/retrieval/hybrid_retriever.py,src/rag_backend/infrastructure/external/pinecone_store.py
backup = False
runner = uv run python -m pytest tests/unit/ -x -q
tests_dir = tests/unit/

# High-priority mutations to catch security boundary violations
[mutmut.mutations_to_apply]
# CRITICAL: Never mutate namespace prefix checks — these are security boundaries
skip = [
    "AOR",      # Arithmetic operator replacement (less critical for security)
]

# Target mutations for security testing
[mutmut.target_mutations]
# These mutations simulate attacks and verify our tests catch them
namespace_prefix_removal = """
# Mutation: Remove namespace_prefix from RetrievalQuery
# Attack: Agent searches ALL namespaces regardless of scope
# Expected: Test should fail because personal docs leak to anonymous users
"""

tool_filter_bypass = """
# Mutation: Remove scope_filter from list_documents tool
# Attack: List all documents including internal ones
# Expected: Test should fail because internal docs are exposed
"""

scope_check_bypass = """
# Mutation: Change DocumentScope default from PERSONAL to PUBLIC
# Attack: All new docs become publicly searchable
# Expected: Test should fail because private docs become public
"""

agent_origin_header_removal = """
# Mutation: Remove X-Agent-Origin header from chat response
# Attack: Loss of audit trail for agent requests
# Expected: Test should fail because header is missing
"""
