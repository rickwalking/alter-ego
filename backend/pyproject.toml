[project]
name = "rag-backend"
version = "0.1.0"
description = "Agentic RAG backend with hybrid search"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "alembic>=1.14.0",
    "asyncpg>=0.31.0",
    "ddgs>=9.14.1",
    "deepagents>=0.5.3",
    "img2pdf>=0.5.1",
    "jinja2>=3.1.6",  # runtime dep: agents/prompts/registry.py renders Jinja2 prompt templates
    "dependency-injector>=4.49.0",
    "fastapi>=0.136.0",
    "langchain>=1.3.9",
    "langchain-core>=1.3.3",
    "langchain-openai>=1.1.14",
    "langchain-pinecone>=0.2.13",
    "langgraph>=1.1.8",
    "langgraph-checkpoint-sqlite>=3.0.3",
    "langgraph-checkpoint-postgres>=3.0.5",
    "openai>=2.32.0",
    "passlib[bcrypt]>=1.7.4",
    "pinecone[asyncio]",
    "playwright>=1.58.0",
    "pydantic>=2.13.2",
    "pydantic-settings>=2.13.1",
    "pyjwt>=2.13.0",
    "psycopg[binary]>=3.3.0",
    "pypdf>=6.12.0",
    "python-dotenv>=1.2.2",
    "pyyaml>=6.0.2",
    "cryptography>=48.0.1",  # GHSA-537c-gmf6-5ccf
    "python-multipart>=0.0.31",  # CVE-2026-53538/53539/53540
    "slowapi>=0.1.9",
    "sqlalchemy>=2.0.49",
    "structlog>=25.5.0",
    "tiktoken>=0.12.0",
    "uvicorn[standard]>=0.44.0",
    "websockets>=14,<16",  # capped <16: langchain 1.3.9 → langgraph-sdk 0.4.2 requires websockets<16 (AE-0182)
    "email-validator>=2.3.0",
    "tenacity>=9.1.4",
    "langfuse>=3.0.0,<4.0.0",
    "redis>=5.2.0",
    "langsmith>=0.8.0",
    "starlette>=1.3.1",  # CVE-2026-54282/54283
]

[tool.uv]
override-dependencies = [
    "idna>=3.15",
    "urllib3>=2.7.0",
    "aiohttp>=3.14.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[dependency-groups]
dev = [
    "aiosqlite>=0.22.1",
    "black>=26.3.1",
    "httpx>=0.28.1",
    "mutmut>=3.5.0",
    "mypy>=1.20.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-pythonpath>=0.7.3",
    "ruff>=0.15.11",
    "vulture>=2.14.0",
    "diff-cover>=9.2.0",
    "interrogate>=1.7.0",
    "import-linter>=2.2",
    "bandit[toml]>=1.7.10",
    "pip-audit>=2.7.0",
    "pip>=26.1.2",
    "types-PyYAML>=6.0.12.20240917",
    "hypothesis>=6.155.1",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.coverage.run]
# Files excluded from coverage measurement (so they don't appear in
# coverage.xml and are not counted by diff-cover). These are scaffolding,
# composition-root wiring, entrypoints, and operational scripts — none are
# unit-tested business logic, and counting them would understate real
# coverage and force gaming. Business-logic modules are NOT omitted.
omit = [
    # AE-0081 module scaffold skeleton (a copy-me template, not live code).
    "*/modules/_template/*",
    # AE-0080 composition root: branchy DI wiring exercised via integration,
    # not unit tests; relocated byte-identical from api/app.py.
    "*/bootstrap/*",
    # ASGI/uvicorn entrypoint (only an `app = create_app()` + __main__ block).
    "*/rag_backend/main.py",
    # Operational scripts (e.g. admin bootstrap), run manually, not unit-tested.
    "*/rag_backend/scripts/*",
    # Autogenerated DB migrations (also outside the rag_backend package).
    "*/alembic/*",
]

[tool.diff_cover]
compare_branch = "origin/main"
fail_under = 75

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
# Strict: ban Any usage completely
disallow_any_explicit = true
# disallow_any_expr = true  # disabled: too aggressive with untyped third-party libs
disallow_any_generics = true
# disallow_any_decorated = true  # disabled: untyped library decorators trigger constantly
show_error_codes = true
pretty = true

# MYPYPATH=src must be set when running mypy so imports resolve as rag_backend.*
# Do not run mypy src/ directly; always use: MYPYPATH=src mypy -p rag_backend

[[tool.mypy.overrides]]
module = [
    "rag_backend.api.schemas",
    "rag_backend.api.schemas.*",
    "rag_backend.api.routes.auth",
    "rag_backend.infrastructure.config.settings",
]
disable_error_code = ["explicit-any", "type-arg"]

# SQLAlchemy ORM models and LangGraph workflow modules carry third-party typing noise.
[[tool.mypy.overrides]]
module = [
    "rag_backend.infrastructure.database.models.*",
    "rag_backend.agents.*",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    # AE-0080: composition-root app factory relocated from api.app to
    # bootstrap.app_factory (byte-identical wiring); overrides moved with it.
    "rag_backend.bootstrap.app_factory",
]
disable_error_code = ["type-var", "return-value", "arg-type", "type-arg", "import-not-found"]

[[tool.mypy.overrides]]
module = [
    "rag_backend.api.routes.*",
    "rag_backend.api.dependencies.*",
]
disable_error_code = [
    "assignment",
    "arg-type",
    "attr-defined",
    "unreachable",
    "call-overload",
    "explicit-any",
    "no-untyped-def",
    "return-value",
    "type-arg",
    "dict-item",
    "index",
    "var-annotated",
    "unused-ignore",
    "misc",
    "list-item",
    "union-attr",
    "call-arg",
    "typeddict-unknown-key",
    "untyped-decorator",
    "no-any-return",
    "import-not-found",
]

[[tool.mypy.overrides]]
module = [
    "rag_backend.api.middleware.*",
]
disable_error_code = ["return-value", "arg-type", "assignment", "no-untyped-def", "import", "misc", "untyped-decorator"]

[[tool.mypy.overrides]]
module = [
    "rag_backend.infrastructure.external.*",
    "rag_backend.infrastructure.database.user_repository",
    "rag_backend.infrastructure.database.config",
    "rag_backend.infrastructure.database.carousel_repository",
    "rag_backend.infrastructure.events.*",
    "rag_backend.infrastructure.retrieval.*",
    "rag_backend.infrastructure.telemetry.*",
    "rag_backend.infrastructure.logging",
    "rag_backend.infrastructure.config.settings",
    "rag_backend.infrastructure.container",
    "rag_backend.infrastructure.langfuse_client",
    "rag_backend.infrastructure.monitoring_langfuse",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "rag_backend.application.services.*",
    "rag_backend.application.tools.*",
    "rag_backend.application.workers.*",
    "rag_backend.infrastructure.monitoring_langfuse",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "rag_backend.domain.models.*",
]
disable_error_code = ["type-arg", "no-any-return", "explicit-any", "assignment"]

[tool.ruff]
target-version = "py311"
line-length = 88
preview = true

[tool.ruff.lint]
select = [
    # Core rules
    "E", "F", "W", "I", "N", "UP", "B", "SIM",
    # Security & bug prevention (Tier 1)
    "S",       # flake8-bandit — hardcoded passwords, unsafe eval, missing timeouts
    "BLE",     # blind except — prevents bare `except Exception:`
    # Control flow & simplification (Tier 1)
    "RET",     # return consistency — early returns, no implicit None after return
    "RSE",     # raise consistency — correct raise usage
    "C4",      # comprehensions — efficient list/dict/set patterns
    # API quality (Tier 1)
    "FBT",     # boolean trap — no boolean positional args
    "A",       # builtins shadow — don't shadow `id`, `type`, `list`, etc.
    "ERA",     # eradicate — commented-out code
    "ARG",     # unused arguments
    "FAST",    # FastAPI-specific — Annotated deps, unused path params
    # Complexity (Tier 2)
    "PLR",     # pylint refactor — branches, statements, args, locals
    "C90",     # mccabe complexity
    "TRY",     # tryceratops — better exception handling patterns
    # Ruff-specific
    "RUF",     # RUF100 catches unused noqa comments
    # Performance hints
    "PERF",    # performance hints
    "PIE",     # pie lint rules
    "PTH",     # use pathlib
]
ignore = [
    # FastAPI dependency injection pattern triggers B008
    "B008",    # Do not perform function call in argument defaults (FastAPI Depends)
    # Health-check endpoints legitimately catch broad exceptions from external services
    "BLE001",  # Do not catch blind exception: `Exception`
    # Complex guard clauses allowed in production
    "RET501",
    "RET502",
    "RET503",
    "RET504",
    "RET505",
]

[tool.ruff.lint.pep8-naming]
# Enforce strict naming conventions
ignore-names = [
    "setUp", "tearDown", "setUpClass", "tearDownClass",
    "setUpModule", "tearDownModule", "asyncSetUp",
    "asyncTearDown", "setUpTestData", "failureException",
    "longMessage", "maxDiff",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = [
    "S101",   # assert_used — idiomatic in tests
    "ANN",    # missing-type annotations — test fixtures are often untyped
    "PLR2004", # magic-value-in-comparison — HTTP status codes in asserts
    "ARG001", # unused-function-argument — mock callbacks/fixtures
    "ARG002", # unused-method-argument — test helpers
    "S108",   # hardcoded-temp-directory — test tmp paths
    "S106",   # hardcoded-password — test tokens/credentials
    "S105",   # hardcoded password variable names in tests
    "E501",   # long docstrings/assert messages in tests
    "SIM105", # try-except-pass in integration test parsers
    "N806",   # non-lowercase-variable — test factory variables
    "N807",   # dunder function name — test setup methods
    "F841",   # unused-variable — test setup variables
    "RUF059", # unused-unpacked-variable — mock tuple unpacking
    "TRY003", # raise-vanilla-args — test helper exceptions
    "PLR0913", # too-many-arguments — test methods with many fixtures
    "PLR0912", # too-many-branches
    "PLR0911", # too-many-return-methods
    "PLR0915", # too-many-locals
    "PLR0914", # too-many-locals
    "PLR0917", # too-many-positional-args
    "PLR0904", # too-many-public-methods — mutation suites need broad coverage
    "RUF069",  # float-equality — deterministic mocked scores in tests
    "RUF029",  # unused-async — AsyncMock side_effect helpers
    "B903",    # class-as-data-structure — lightweight test stubs
    "C901",   # mccabe complexity
    "PLR6301", # static methods
    "FBT001", # boolean trap
    "FBT002", # boolean default value
    "E402",   # module level import
    "ERA001", # Gherkin scenario reference comments in test files
    "PLR6201", "ARG005", "PERF401", "B007",
]
# Pre-commit passes paths as backend/tests/... from repo root
"backend/tests/**/*" = [
    "S101", "ANN", "PLR2004", "ARG001", "ARG002", "S108", "S106", "S105",
    "E501", "SIM105", "N806", "N807", "F841", "RUF059", "TRY003", "PLR0913",
    "PLR0912", "PLR0911", "PLR0915", "PLR0914", "PLR0917", "PLR0904",
    "RUF069", "RUF029", "B903", "C901", "PLR6301",
    "FBT001", "FBT002", "E402", "ERA001", "PLR6201", "ARG005", "PERF401", "B007",
