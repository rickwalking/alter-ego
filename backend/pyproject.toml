[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-branches = 8
max-statements = 50
max-args = 3
max-returns = 5
max-locals = 12
max-nested-blocks = 4


[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]  # assert_used — we use assert in tests, excluded via exclude_dirs anyway

[tool.interrogate]
fail-under = 80
exclude = ["tests", "build", "docs"]
ignore-init-method = true
ignore-init-module = true
ignore-magic = true
ignore-semiprivate = true
ignore-private = true
ignore-property-decorators = true
ignore-nested-functions = true
ignore-nested-classes = true
ignore-setters = true
verbose = 0
quiet = false
color = true

[tool.mutmut]
paths_to_mutate = [
    "src/rag_backend/application/services/carousel/editorial_workflow_service.py",
    "src/rag_backend/application/services/carousel/editorial_workflow_support.py",
    "src/rag_backend/application/services/carousel/nodes/export.py",
    "src/rag_backend/api/routes/carousels/preview.py",
    "src/rag_backend/application/services/carousel/editorial_workflow_resume_runner.py",
    "src/rag_backend/agents/carousel_editorial_orchestrator.py",
    "src/rag_backend/application/services/carousel/phase_subagents.py",
    "src/rag_backend/agents/carousel_workflow.py",
