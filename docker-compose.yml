services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    #ports:
    #  - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://rag_user:rag_password@postgres:5432/rag_db
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-}
      ANON_SECRET_KEY: ${ANON_SECRET_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      DEBUG: "false"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

  langfuse-db-init:
    image: postgres:17-alpine
    entrypoint:
      - sh
      - -c
      - |
        until pg_isready -h postgres -U "$$POSTGRES_USER"; do sleep 1; done
        PGPASSWORD=$$POSTGRES_PASSWORD createdb -h postgres -U "$$POSTGRES_USER" langfuse 2>/dev/null || echo "langfuse database already exists"
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-changeme}
      CLICKHOUSE_DB: langfuse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

  langfuse:
    image: langfuse/langfuse:3
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_OPTIONS: "--max-old-space-size=1024"
      DATABASE_URL: postgresql://rag_user:rag_password@postgres:5432/langfuse
      DIRECT_URL: postgresql://rag_user:rag_password@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT:-}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:${LANGFUSE_CLICKHOUSE_PASSWORD:-changeme}@clickhouse:9000
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-changeme}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_DEFAULT_ORG_ID: ${LANGFUSE_DEFAULT_ORG_ID:-default}
      LANGFUSE_DEFAULT_PROJECT_ID: ${LANGFUSE_DEFAULT_PROJECT_ID:-default}
      LANGFUSE_DEFAULT_PROJECT_NAME: ${LANGFUSE_DEFAULT_PROJECT_NAME:-alter-ego}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "none"
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-db-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  clickhouse_data:
