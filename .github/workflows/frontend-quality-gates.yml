name: Frontend Quality Gates

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/ci/**'
      - '.github/workflows/frontend-quality-gates.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/ci/**'
      - '.github/workflows/frontend-quality-gates.yml'

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: frontend / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (errors only, repo-wide)
        run: npm run lint

      - name: Setup reviewdog
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: ESLint review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run lint:all -- -f unix 2>&1 \
            | reviewdog -f=eslint -name="eslint" -reporter=github-pr-review -level=error -filter-mode=diff_context \
            || true

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Lint" \
            "ESLint reported errors. Changed-file strict rules run in the \`frontend / Lint (changed)\` job."

  lint-changed:
    name: frontend / Lint (changed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Strict ESLint on changed files
        run: npm run lint:changed

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Lint (changed)" \
            "Changed files violate strict ESLint rules (including page size/complexity warnings promoted to errors)."

  type-check:
    name: frontend / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  test:
    name: frontend / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Test" \
            "Vitest suite failed."

  security:
    name: frontend / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high severity)
        run: npm audit --audit-level=high

  format-check:
    name: frontend / Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{ts,tsx,json,css,md}"

  mutation-advisory:
    name: frontend / Mutation (advisory)
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests (Stryker)
        run: npm run test:mutate

      - name: Post PR mutation summary
        if: always() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Mutation (advisory)" \
            "Stryker mutation testing completed (non-blocking). Review the Stryker report in workflow logs."
