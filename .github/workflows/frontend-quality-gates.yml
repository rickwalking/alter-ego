name: Frontend Quality Gates

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/ci/**'
      - '.github/workflows/frontend-quality-gates.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/ci/**'
      - '.github/workflows/frontend-quality-gates.yml'

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: frontend / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Gate definitions live in scripts/ci/gates.sh (single source of truth);
      # the /qa-agent skill runs the SAME script, so local QA and CI cannot drift.
      - name: Run ESLint (errors only, repo-wide)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:lint

      - name: Setup reviewdog
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: ESLint review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run lint:all -- -f unix 2>&1 \
            | reviewdog -f=eslint -name="eslint" -reporter=github-pr-review -level=error -filter-mode=diff_context \
            || true

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Lint" \
            "ESLint reported errors. Changed-file strict rules run in the \`frontend / Lint (changed)\` job."

  lint-changed:
    name: frontend / Lint (changed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Strict ESLint on changed files
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:lint-changed

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Lint (changed)" \
            "Changed files violate strict ESLint rules (including page size/complexity warnings promoted to errors)."

  type-check:
    name: frontend / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:typecheck

  build:
    name: frontend / Build
    # AE-0167: production `next build`. Catches build-only breakage that
    # tsc/lint/test miss (e.g. a client-only hook without "use client", AE-0155).
    # Definition lives in scripts/ci/gates.sh (also run by /qa-agent).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build (next build)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:build

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Build" \
            "\`next build\` failed — a build-only error (e.g. a client-only hook without \"use client\") that tsc/lint/test do not catch. Run \`cd frontend && npm run build\` locally."

  duplication:
    name: frontend / Duplication
    # AE-0149: source-scoped copy-paste detection (jscpd). Blocks NEW source
    # duplication above the ratchet-down threshold in frontend/.jscpd.json.
    # Test/spec/story files are excluded by design (advisory only — see the
    # frontend / Duplication (tests, advisory) job). Definition lives in
    # scripts/ci/gates.sh (also run by /qa-agent), so CI and local QA cannot drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Detect source duplication (jscpd)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:duplication

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Duplication" \
            "New source copy-paste duplication exceeds the jscpd threshold (frontend/.jscpd.json). Extract the shared logic instead of duplicating; the threshold may only ratchet DOWN."

  dead-code:
    name: frontend / Dead code
    # AE-0152: knip-based dead-export gate with an identity-keyed, down-only
    # baseline. Blocks NET-NEW unused exports in PR-changed files (day-one
    # changed-file blocking); pre-existing/unchanged-file findings are advisory
    # until the full-tree flip. Definition in scripts/ci/gates.sh. fetch-depth: 0
    # is required so the changed-file diff (vs the base ref) resolves.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Detect new dead exports (knip)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:dead-code

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Dead code" \
            "A changed file introduces an exported symbol nothing imports (dead code). Delete it or wire it up — do not grandfather it into the baseline (it is down-only)."

  legacy-guard:
    name: frontend / Legacy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Forbid legacy v1 imports in dashboard app
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:legacy-guard

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Legacy guard" \
            "Dashboard code imports forbidden v1 symbols or routes. See docs/plans/frontend-legacy-removal.md."

  legacy-inventory:
    name: frontend / Legacy inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Phase 1 scheduled deletions are complete
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:legacy-inventory

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Legacy inventory" \
            "Phase 1 deletion inventory incomplete. See docs/plans/frontend-legacy-removal.md."

  test:
    name: frontend / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:test

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Test" \
            "Vitest suite failed."

  e2e-auth-baseline:
    name: frontend / E2E auth baseline
    # AE-0165: deterministic, backend-free Playwright safety net that pins the
    # CURRENT frontend auth behavior (middleware guards, login, logout, role
    # gating) so the later identity-module relocation (AE-0156/0164) can be
    # proven byte-identical. The `auth-baseline` Playwright project boots its own
    # `npm run dev` webServer and mocks all /api/auth/* + /api/admin/* calls, so
    # NO backend or external API keys are required. BLOCKING (not advisory): the
    # specs are deterministic, so any auth-behavior drift must fail the job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run auth baseline E2E (auth-baseline project)
        run: npm run test:e2e:auth

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-auth-baseline-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "E2E auth baseline" \
            "The auth baseline safety net (AE-0165) failed: current frontend auth behavior changed. If intentional, update tests/e2e/auth-baseline.spec.ts."

  security:
    name: frontend / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high severity)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:security

  format-check:
    name: frontend / Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:format

  schema-drift:
    name: frontend / Schema drift
    # AE-0141: checks OpenAPI<->Zod drift against docs/architecture/openapi.json
    # (committed by backend/scripts/export_openapi.py). BLOCKING (AE-0157): drift
    # was reconciled to 0 and the npm script runs with --strict, so any new
    # OpenAPI<->Zod divergence fails the job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check OpenAPI <-> Zod schema drift
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:schema-drift

  duplication-tests-advisory:
    name: frontend / Duplication (tests, advisory)
    # AE-0151: surfaces test-file copy-paste duplication (jscpd over *.test.* /
    # *.spec.*). Non-blocking by design — test boilerplate is acceptable and is
    # excluded from the blocking frontend / Duplication gate (AE-0149); this job
    # only reports the signal without forcing harmful test-DRYing.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Report test-file duplication (jscpd)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:duplication-tests

      - name: Post PR duplication (tests) summary
        if: always() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Duplication (tests, advisory)" \
            "jscpd scanned test-file duplication (non-blocking). Acceptable test boilerplate is not gated; review the jscpd report in workflow logs for egregious cases worth extracting into shared fixtures."

  dead-files-advisory:
    name: frontend / Dead files (advisory)
    # AE-0178: surfaces unused FILES (knip --include files) — the class the
    # blocking export-scoped dead-code gate (AE-0152) does NOT cover. Non-blocking
    # by design — knip's file scope reports barrel-reachable / framework files too
    # noisy to block on; this job only reports the signal (mirrors the
    # duplication-tests advisory). Do not delete reported files reflexively.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Report dead files (knip, file scope)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:dead-files

      - name: Post PR dead-files summary
        if: always() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Dead files (advisory)" \
            "knip scanned for unused FILES (non-blocking). Complements the blocking export-scoped dead-code gate; barrel-reachable / framework files are noisy, so review the knip report in workflow logs for genuinely orphaned files worth removing."

  mutation-advisory:
    name: frontend / Mutation (advisory)
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests (Stryker)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:mutation

      - name: Post PR mutation summary
        if: always() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Mutation (advisory)" \
            "Stryker mutation testing completed (non-blocking). Review the Stryker report in workflow logs."

  integrity:
    name: frontend / Integrity (anti-gaming)
    # Diff-scoped ratchet for the frontend tree: blocks NET-NEW suppressions
    # (eslint-disable / @ts-ignore / @ts-expect-error / @ts-nocheck /
    # prettier-ignore), skipped or focused tests (.skip / .only / xit), and
    # threshold loosening. Pre-existing debt is never gated. Definition lives in
    # scripts/ci/check-integrity.sh (also run by /qa-agent).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run integrity scan (net-new gaming → fail)
        working-directory: .
        run: bash scripts/ci/gates.sh frontend:integrity

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Frontend" "Integrity (anti-gaming)" \
            "New eslint-disable/@ts-ignore suppressions, skipped/focused tests, or loosened thresholds were introduced. Fix the underlying issue instead of bypassing the gate."
