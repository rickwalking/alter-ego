name: Backend Quality Gates

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/ci/**'
      - '.github/workflows/backend-quality-gates.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/ci/**'
      - '.github/workflows/backend-quality-gates.yml'

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-format:
    name: backend / Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting with Ruff
        run: uv run ruff format --check src/

      - name: Lint with Ruff
        run: uv run ruff check src/

      - name: Ruff diff check (changed files only)
        # Blocking (AE-0049): fails if changed Python files contain ruff
        # violations. Guards against empty diffs, the first commit on a
        # branch, and fork PRs where origin/main may be unavailable.
        run: |
          if ! git fetch origin main --depth=1 2>/dev/null; then
            echo "origin/main unavailable (fork PR / first commit) — skipping ruff diff check."
            exit 0
          fi
          mapfile -t CHANGED < <(git diff --name-only origin/main...HEAD -- '*.py' 2>/dev/null)
          if ((${#CHANGED[@]} == 0)); then
            echo "No changed Python files — skipping ruff diff check."
            exit 0
          fi
          echo "Running ruff --diff on ${#CHANGED[@]} changed file(s)."
          uv run ruff check --diff "${CHANGED[@]}"

      - name: Ruff review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: Post ruff inline review comments
        if: github.event_name == 'pull_request' && failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ../scripts/ci/ruff-reviewdog.sh check src/

      - name: Check for blanket ignores
        run: |
          if grep -q 'src/rag_backend/\*\*' pyproject.toml; then
            echo "ERROR: Blanket ignore 'src/rag_backend/**' found in pyproject.toml"
            echo "Per-file-ignores should target specific files, not entire directories."
            exit 1
          fi

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Lint & Format" \
            "Ruff format or lint failed. See inline review comments when available."

  strict-diff:
    name: backend / Strict Diff (args & complexity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Strict ruff on changed files
        working-directory: .
        run: bash scripts/ci/ruff-strict-changed.sh

      - name: Strict ruff review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: Post strict ruff inline review comments
        if: github.event_name == 'pull_request' && failure()
        working-directory: .
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t files < <(bash scripts/ci/changed-backend-files.sh)
          if ((${#files[@]})); then
            cd backend
            bash ../scripts/ci/ruff-reviewdog.sh check --select PLR0913,C901,PLR0912,PLR0911,PLR0914,PLR1702 "${files[@]}"
          fi

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Strict Diff" \
            "Changed lines exceed a strict threshold: max-args=3, max-complexity=10, max-branches=8, max-returns=5, max-locals=12, or max-nested-blocks=4."

  type-check:
    name: backend / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Type check with mypy
        run: cd src && uv run mypy rag_backend/ --explicit-package-bases

  architecture:
    name: backend / Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check import architecture
        run: uv run lint-imports

  docstrings:
    name: backend / Docstrings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check docstring coverage (≥80%)
        run: uv run interrogate src/ --verbose

  security:
    name: backend / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Bandit security scan
        run: uv run bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

      - name: Audit dependencies with pip-audit
        run: uv run pip-audit --desc --ignore-vuln PYSEC-2022-42969 --ignore-vuln PYSEC-2026-196
        env:
          PIPAPI_PYTHON_LOCATION: ${{ env.pythonLocation }}/bin/python

  test:
    name: backend / Test & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rag_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests with coverage
        run: uv run pytest --cov=rag_backend --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/rag_test
          SECRET_KEY: test-secret-key-for-ci-tests!!
          ANON_SECRET_KEY: test-anon-secret-for-ci-tests!

      - name: Enforce diff coverage ≥75% (blocking — AE-0049)
        # Blocking: fails the PR if diff coverage on changed lines < 75%.
        # Guards fork PRs / first commit where origin/main is unavailable;
        # diff-cover on an empty diff reports 100% and passes.
        run: |
          if ! git fetch origin main --depth=1 2>/dev/null; then
            echo "origin/main unavailable (fork PR / first commit) — skipping diff coverage gate."
            exit 0
          fi
          uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=75

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Test & Coverage" \
            "Tests failed or diff coverage is below 75%."

  mutation:
    name: backend / Mutation (blocking ≥75%)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run mutation tests and enforce score ≥75% (blocking — AE-0049)
        working-directory: .
        run: bash scripts/ci/mutation-score-gate.sh 75
        env:
          SECRET_KEY: test-secret-key-for-ci-tests!!
          ANON_SECRET_KEY: test-anon-secret-for-ci-tests!

      - name: Show mutation results
        if: always()
        run: uv run mutmut results

      - name: Post PR mutation summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Mutation (blocking ≥75%)" \
            "Mutation score dropped below the 75% threshold. Review \`mutmut results\` and strengthen the failing tests."

  dead-code:
    name: backend / Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check for dead code
        run: uv run vulture src/ vulture_whitelist.py --min-confidence 80
