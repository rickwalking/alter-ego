name: Backend Quality Gates

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/ci/**'
      - '.github/workflows/backend-quality-gates.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/ci/**'
      - '.github/workflows/backend-quality-gates.yml'

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-format:
    name: backend / Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting with Ruff
        run: uv run ruff format --check src/

      - name: Lint with Ruff
        run: uv run ruff check src/

      - name: Ruff diff check (changed files only)
        run: |
          git fetch origin main
          uv run ruff check --diff $(git diff --name-only origin/main... -- '*.py') || true
        # Non-blocking advisory for now; will be made blocking after baseline

      - name: Ruff review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: Post ruff inline review comments
        if: github.event_name == 'pull_request' && failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ../scripts/ci/ruff-reviewdog.sh check src/

      - name: Check for blanket ignores
        run: |
          if grep -q 'src/rag_backend/\*\*' pyproject.toml; then
            echo "ERROR: Blanket ignore 'src/rag_backend/**' found in pyproject.toml"
            echo "Per-file-ignores should target specific files, not entire directories."
            exit 1
          fi

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Lint & Format" \
            "Ruff format or lint failed. See inline review comments when available."

  strict-diff:
    name: backend / Strict Diff (args & complexity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Strict ruff on changed files
        working-directory: .
        run: bash scripts/ci/ruff-strict-changed.sh

      - name: Strict ruff review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: Post strict ruff inline review comments
        if: github.event_name == 'pull_request' && failure()
        working-directory: .
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t files < <(bash scripts/ci/changed-backend-files.sh)
          if ((${#files[@]})); then
            cd backend
            bash ../scripts/ci/ruff-reviewdog.sh check --select PLR0913,C901,PLR0912 "${files[@]}"
          fi

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Strict Diff" \
            "Changed files exceed max-args (3), cyclomatic complexity, or branch limits."

  type-check:
    name: backend / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Type check with mypy
        run: cd src && uv run mypy rag_backend/ --explicit-package-bases

  architecture:
    name: backend / Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check import architecture
        run: uv run lint-imports

  docstrings:
    name: backend / Docstrings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check docstring coverage (≥80%)
        run: uv run interrogate src/ --verbose

  security:
    name: backend / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Bandit security scan
        run: uv run bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

      - name: Audit dependencies with pip-audit
        run: uv run pip-audit --desc --ignore-vuln PYSEC-2022-42969 --ignore-vuln PYSEC-2026-196
        env:
          PIPAPI_PYTHON_LOCATION: ${{ env.pythonLocation }}/bin/python

  test:
    name: backend / Test & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rag_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests with coverage
        run: uv run pytest --cov=rag_backend --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/rag_test
          SECRET_KEY: test-secret-key-for-ci-tests!!
          ANON_SECRET_KEY: test-anon-secret-for-ci-tests!

      - name: Enforce diff coverage ≥75% (phase 1-5 pivot baseline)
        run: uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=75

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Test & Coverage" \
            "Tests failed or diff coverage is below 75%."

  mutation-advisory:
    name: backend / Mutation (advisory)
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run mutation tests
        run: uv run mutmut run
        env:
          SECRET_KEY: test-secret-key-for-ci-tests!!
          ANON_SECRET_KEY: test-anon-secret-for-ci-tests!

      - name: Show mutation results
        if: always()
        run: uv run mutmut results

      - name: Post PR mutation summary
        if: always() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Mutation (advisory)" \
            "Mutation testing completed (non-blocking). Review \`mutmut results\` in workflow logs."

  dead-code:
    name: backend / Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check for dead code
        run: uv run vulture src/ vulture_whitelist.py --min-confidence 80
