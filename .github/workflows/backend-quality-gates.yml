name: Backend Quality Gates

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/ci/**'
      - '.github/workflows/backend-quality-gates.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/ci/**'
      - '.github/workflows/backend-quality-gates.yml'

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-format:
    name: backend / Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      # Gate definitions live in scripts/ci/gates.sh (single source of truth);
      # the /qa-agent skill runs the SAME script, so local QA and CI cannot drift.
      - name: Check formatting with Ruff
        working-directory: .
        run: bash scripts/ci/gates.sh backend:format

      - name: Lint with Ruff
        working-directory: .
        run: bash scripts/ci/gates.sh backend:lint

      - name: Ruff diff check (changed files only)
        working-directory: .
        run: bash scripts/ci/gates.sh backend:lint-diff

      - name: Ruff review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: Post ruff inline review comments
        if: github.event_name == 'pull_request' && failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ../scripts/ci/ruff-reviewdog.sh check src/

      - name: Check for blanket ignores
        working-directory: .
        run: bash scripts/ci/gates.sh backend:blanket-ignore

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Lint & Format" \
            "Ruff format or lint failed. See inline review comments when available."

  strict-diff:
    name: backend / Strict Diff (args & complexity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Strict ruff on changed files
        working-directory: .
        run: bash scripts/ci/gates.sh backend:strict-diff

      - name: Strict ruff review comments (PR)
        if: github.event_name == 'pull_request' && failure()
        uses: reviewdog/action-setup@v1

      - name: Post strict ruff inline review comments
        if: github.event_name == 'pull_request' && failure()
        working-directory: .
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t files < <(bash scripts/ci/changed-backend-files.sh)
          if ((${#files[@]})); then
            cd backend
            bash ../scripts/ci/ruff-reviewdog.sh check --select PLR0913,C901,PLR0912,PLR0911,PLR0914,PLR1702 "${files[@]}"
          fi

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Strict Diff" \
            "Changed lines exceed a strict threshold: max-args=3, max-complexity=10, max-branches=8, max-returns=5, max-locals=12, or max-nested-blocks=4."

  type-check:
    name: backend / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Type check with mypy
        working-directory: .
        run: bash scripts/ci/gates.sh backend:type

  architecture:
    name: backend / Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check import architecture
        working-directory: .
        run: bash scripts/ci/gates.sh backend:imports

      - name: Architecture report (AE-0085, per-category vs baseline)
        # Non-blocking REPORT: surfaces all six AE-0078 categories (current
        # vs committed baseline) in the GitHub Step Summary and as an
        # artifact so reviewers see architecture health every run. Reuses the
        # AE-0082 single-source-of-truth baseline. The ENFORCING step is the
        # ratchet below; this `--summary` mirrors its verdict but never gates.
        if: always()
        working-directory: .
        run: |
          python3 scripts/metrics/import_baseline.py --summary | tee architecture-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload architecture report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-report
          path: architecture-report.md
          if-no-files-found: warn

      - name: Ratchet non-import boundaries (get_container, .commit)
        working-directory: .
        run: bash scripts/ci/gates.sh backend:arch-ratchet

  docstrings:
    name: backend / Docstrings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check docstring coverage (≥80%)
        working-directory: .
        run: bash scripts/ci/gates.sh backend:docstrings

  security:
    name: backend / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Bandit security scan
        run: uv run bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

      - name: Audit dependencies with pip-audit
        working-directory: .
        run: bash scripts/ci/gates.sh backend:pip-audit
        env:
          PIPAPI_PYTHON_LOCATION: ${{ env.pythonLocation }}/bin/python

  test:
    name: backend / Test & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rag_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests with coverage
        working-directory: .
        run: bash scripts/ci/gates.sh backend:test
        env:
          GATES_REQUIRE_ALL: "1"
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/rag_test
          SECRET_KEY: test-secret-key-for-ci-tests!!
          ANON_SECRET_KEY: test-anon-secret-for-ci-tests!

      - name: Enforce diff coverage ≥75% (blocking — AE-0049)
        working-directory: .
        run: bash scripts/ci/gates.sh backend:diff-cover
        env:
          GATES_REQUIRE_ALL: "1"
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/rag_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Test & Coverage" \
            "Tests failed or diff coverage is below 75%."

  migrations:
    name: backend / Migrations (fresh DB)
    # AE-0084: Provisions a FRESH Postgres and runs `alembic upgrade head`
    # from an empty DB, then a `downgrade base` round-trip. Fails on any
    # migration error or timeout, catching broken/out-of-order or
    # non-reversible revisions before they land (Phase 4+ reversible-path
    # discipline).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rag_migrations
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      # AE-0086: upgrade head on a fresh DB, then autogenerate-must-be-empty drift
      # check, then downgrade base round-trip — all defined in gates.sh.
      - name: alembic upgrade / drift-check / downgrade (fresh DB, bounded)
        timeout-minutes: 15
        working-directory: .
        run: bash scripts/ci/gates.sh backend:migrations
        env:
          GATES_REQUIRE_ALL: "1"
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/rag_migrations

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Migrations (fresh DB)" \
            "alembic upgrade head or downgrade base failed on a fresh database. A migration revision is broken, out of order, or non-reversible."

  mutation:
    name: backend / Mutation (blocking ≥75%)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Run mutation tests and enforce score ≥75% (blocking — AE-0049)
        working-directory: .
        run: bash scripts/ci/gates.sh backend:mutation
        env:
          GATES_REQUIRE_ALL: "1"
          SECRET_KEY: test-secret-key-for-ci-tests!!
          ANON_SECRET_KEY: test-anon-secret-for-ci-tests!

      - name: Show mutation results
        if: always()
        run: uv run mutmut results

      - name: Post PR mutation summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Mutation (blocking ≥75%)" \
            "Mutation score dropped below the 75% threshold. Review \`mutmut results\` and strengthen the failing tests."

  dead-code:
    name: backend / Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Check for dead code
        working-directory: .
        run: bash scripts/ci/gates.sh backend:dead-code

  integrity:
    name: backend / Integrity (anti-gaming)
    # Diff-scoped ratchet: blocks NET-NEW gate-gaming introduced in the PR —
    # suppressions (# noqa / # type: ignore / # nosec / # pragma: no cover),
    # skipped/weakened tests, threshold loosening, raised architecture
    # baselines, and prohibited DDD imports. Pre-existing debt is never gated.
    # Definition lives in scripts/ci/check-integrity.sh (also run by /qa-agent).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run integrity scan (net-new gaming → fail)
        working-directory: .
        run: bash scripts/ci/gates.sh backend:integrity

      - name: Post PR summary on failure
        if: failure() && github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/ci/post-pr-quality-comment.sh \
            "Backend" "Integrity (anti-gaming)" \
            "New suppressions, skipped tests, loosened thresholds, or prohibited imports were introduced. Fix the underlying issue instead of bypassing the gate."
