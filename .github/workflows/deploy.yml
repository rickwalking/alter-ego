name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run backend tests
        working-directory: backend
        run: |
          uv sync
          uv run pytest --cov=rag_backend --cov-report=xml

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm run test -- --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prune stale tracked source on server (scp does not delete removed files)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            # appleboy/scp-action OVERLAYS files but never deletes ones removed in
            # git. A file deleted or moved in a PR (e.g. a relocated component)
            # therefore lingers on the server and breaks the Docker build —
            # exactly what failed after the Phase 8 refactor. Wipe the git-tracked
            # build-context source trees so the scp below lands a clean tree.
            # Untracked server state (nginx/ssl certs, .env, docker volumes) lives
            # OUTSIDE these dirs and is preserved.
            rm -rf /opt/alter-ego/frontend/src \
                   /opt/alter-ego/frontend/scripts \
                   /opt/alter-ego/backend/src

      - name: Sync code to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "."
          target: "/opt/alter-ego"
          strip_components: 0
          # Do NOT use rm: true — it would delete server-side files like
          # nginx/ssl/cert.pem and nginx/ssl/key.pem (Cloudflare Origin
          # Certificate) which are not tracked in git. scp-action has no `exclude`
          # input (it is silently ignored), so stale-file pruning is handled by
          # the "Prune stale tracked source" step above instead. The deploy
          # checkout has no node_modules/.venv/.next to copy.

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /opt/alter-ego

            # Write SSL certificates from secrets (self-healing if certs are ever lost)
            mkdir -p nginx/ssl
            if [ -n "${{ secrets.DO_SSL_CERT }}" ]; then
              printf '%s' '${{ secrets.DO_SSL_CERT }}' > nginx/ssl/cert.pem
            fi
            if [ -n "${{ secrets.DO_SSL_KEY }}" ]; then
              printf '%s' '${{ secrets.DO_SSL_KEY }}' > nginx/ssl/key.pem
            fi
            chmod 600 nginx/ssl/key.pem

            # Validate certificate files exist and are non-empty
            if [ ! -s nginx/ssl/cert.pem ]; then
              echo "ERROR: nginx/ssl/cert.pem is missing or empty."
              echo "Please set the DO_SSL_CERT GitHub Secret."
              exit 1
            fi
            if [ ! -s nginx/ssl/key.pem ]; then
              echo "ERROR: nginx/ssl/key.pem is missing or empty."
              echo "Please set the DO_SSL_KEY GitHub Secret."
              exit 1
            fi

            # Create/update environment file
            cat > .env << 'EOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ANON_SECRET_KEY=${{ secrets.ANON_SECRET_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }}
            LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }}
            LANGFUSE_SALT=${{ secrets.LANGFUSE_SALT }}
            LANGFUSE_NEXTAUTH_SECRET=${{ secrets.LANGFUSE_NEXTAUTH_SECRET }}
            LANGFUSE_ENCRYPTION_KEY=${{ secrets.LANGFUSE_ENCRYPTION_KEY }}
            LANGFUSE_CLICKHOUSE_PASSWORD=${{ secrets.LANGFUSE_CLICKHOUSE_PASSWORD }}
            LANGFUSE_MINIO_PASSWORD=${{ secrets.LANGFUSE_MINIO_PASSWORD }}
            WRITING_STYLE_URLS=${{ secrets.WRITING_STYLE_URLS }}
            ALLOWED_ORIGINS=https://marinssolutions.com
            ENVIRONMENT=production
            CAROUSEL_CHECKPOINT_BACKEND=postgres
            CAROUSEL_CHECKPOINT_POSTGRES_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
            EOF

            # Langfuse env must never be blank — a blank SALT/ENCRYPTION_KEY
            # invalidates all API keys and encrypted data on container recreate.
            for var in LANGFUSE_SALT LANGFUSE_NEXTAUTH_SECRET LANGFUSE_ENCRYPTION_KEY LANGFUSE_CLICKHOUSE_PASSWORD LANGFUSE_MINIO_PASSWORD LANGFUSE_SECRET_KEY LANGFUSE_PUBLIC_KEY; do
              if ! grep -q "^${var}=..*" .env; then
                echo "ERROR: ${var} is empty. Set the ${var} GitHub Secret before deploying."
                exit 1
              fi
            done

            # Deploy with Docker Compose (server caches layers automatically)
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml pull
            # Build images first so the migration one-shot below uses the freshly
            # built backend image (and the app start that follows is cache-warm).
            docker compose -f docker-compose.prod.yml build

            # --- Database migrations (AE-0207) --------------------------------
            # Prod used to bootstrap via SQLAlchemy create_all, which NEVER ALTERs
            # an existing table — so every model column added later silently 500'd
            # prod (caught live: caption_en, origin, distribution). Run Alembic
            # migrations to head BEFORE the app serves traffic, then assert the
            # live schema actually matches the mapped ORM columns. Both steps run
            # against the running Postgres only; the app containers are not up yet.
            # NOTE: a one-time operator reconcile (alembic stamp of the existing
            # drifted prod DB) is required ONCE before the first migrated deploy —
            # see docs/deployment/prod-migration-reconcile.md.
            docker compose -f docker-compose.prod.yml up -d postgres
            echo "--- Waiting for Postgres to be healthy ---"
            for _ in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U "${{ secrets.POSTGRES_USER }}" >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            # DISABLED (AE-0207 rework): migrate-on-deploy + drift gate removed.
            # The alembic chain has TWO heads (0011_drop_audit_stream_entry_id +
            # e5f6a7b8c9d0) so `alembic upgrade head` errors, and prod was never
            # stamped — this TOOK PROD DOWN on 2026-06-18 (deploy aborted before
            # the app stack came up). Re-enable ONLY after the two heads are merged
            # AND the one-time prod `alembic stamp` reconcile is done
            # (docs/deployment/prod-migration-reconcile.md). Prod uses create_all
            # bootstrap until then.

            # Bring up the full stack.
            docker compose -f docker-compose.prod.yml up -d

            # Wait for services to start
            sleep 10

            # Post-deploy health check & diagnostics
            echo "--- Checking listening ports ---"
            ss -tlnp | grep -E ':80|:443|:3000|:8000' || true

            echo "--- Local curl to nginx ---"
            curl -s -o /dev/null -w "%{http_code}" http://localhost/ || true

            echo "--- Container status ---"
            docker compose -f docker-compose.prod.yml ps

            echo "--- Nginx logs (last 20 lines) ---"
            docker compose -f docker-compose.prod.yml logs --tail=20 nginx || true

            echo "--- Frontend logs (last 20 lines) ---"
            docker compose -f docker-compose.prod.yml logs --tail=20 frontend || true

            # Clean up old images
            docker image prune -af --filter "until=168h"
